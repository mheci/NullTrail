name: Release & Quality Gate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types: [published]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Syntax Check Userscript
        run: |
          node --check NullTrail.user.js
          echo "✓ Userscript syntax is perfectly valid!"

      - name: Run Regression Harness (core)
        run: |
          node tests/smoke.js
          for c in bing google duckduckgo perplexity walla; do
            NT_CASE=$c node tests/smoke-engines.js
          done
          node tests/perf-check.js
          echo "✓ Core regression tests passed!"

      - name: Run Regression Harness (network friendliness)
        run: |
          NT_METERED=1 NT_ADNOISE=1 node tests/smoke-network.js
          NT_ADNOISE=1 node tests/smoke-network.js
          NT_METERED=1 NT_ADNOISE=1 NT_NORESPECT=1 node tests/smoke-network.js
          echo "✓ Network-friendliness tests passed!"

      - name: Verify Release Metadata Consistency
        run: |
          node tests/meta-check.js
          echo "✓ Release metadata consistent!"

      - name: Verify Userscript Metadata Headers
        run: |
          if ! grep -q "@name" NullTrail.user.js; then
            echo "Error: Missing @name in metadata header"
            exit 1
          fi
          if ! grep -q "@version" NullTrail.user.js; then
            echo "Error: Missing @version in metadata header"
            exit 1
          fi
          if ! grep -q "@updateURL" NullTrail.user.js; then
            echo "Warning: Missing @updateURL in metadata header"
          fi
          if ! grep -q "@downloadURL" NullTrail.user.js; then
            echo "Warning: Missing @downloadURL in metadata header"
          fi
          echo "✓ Metadata headers verified!"
